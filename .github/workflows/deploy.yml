name: Continuous Deployment (Business Hosting)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: client
        run: npm install

      - name: Build Frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_BASE_URL: https://thebeyondheaven.com/api
          VITE_SERVER_URL: https://thebeyondheaven.com

      - name: Deploy Frontend via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "client/dist/*"
          target: "public_html"
          strip_components: 2

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-and-deploy-frontend
    steps:
      - name: SSH to Server and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Navigate to your backend directory
            # Assuming backend is in a folder named 'api' or root
            cd public_html/server || mkdir -p public_html/server && cd public_html/server
            
            # If git isn't setup in that folder, you might need to clone or rsync
            # For simplicity, we assume the repo is already managed via git on the server
            git pull origin main
            
            # Install backend dependencies
            npm install --production
            
            # Restart the Node.js application 
            # (Hostinger uses a specific Node.js selector, but if pm2 is available:)
            pm2 restart all || echo "PM2 not found, please ensure Node.js is running via Hostinger Panel"
