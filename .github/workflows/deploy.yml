name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  checkout:
    name: Checkout Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}     # e.g., your-server-ip.com
          username: ${{ secrets.SERVER_USER }} # e.g., root
          key: ${{ secrets.SERVER_KEY }}       # Your SSH private key
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Navigate to the project directory on your Hostinger server
            cd /home/${{ secrets.SERVER_USER }}/BeyondHeaven || git clone https://github.com/Mathewselvi/BeyondHeaven.git /home/${{ secrets.SERVER_USER }}/BeyondHeaven && cd /home/${{ secrets.SERVER_USER }}/BeyondHeaven

            # Pull the latest changes from main branch
            git pull origin main

            # Rebuild and restart the Docker containers
            docker-compose up -d --build

            # Optional: Clear unused Docker images
            docker image prune -f
